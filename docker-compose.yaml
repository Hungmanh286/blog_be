services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:17-alpine
    container_name: blog_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts:/scripts
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123123
    ports:
      - "5436:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d blog" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - datablog-net

  # ---------------------------------------------------------------------------
  # MinIO object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: blog_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datablog-net

  app:
    image: data_blog:latest
    container_name: blog_app
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg2://admin:123123@db:5432/blog"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: blog-images
      MINIO_PUBLIC_URL: "https://hungmanhdev.me"
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - datablog-net
    volumes:
      - ./app:/app/app
      - ./logging.ini:/app/logging.ini:ro

volumes:
  minio_data:
  db_data:


networks:
  datablog-net:
    driver: bridge
